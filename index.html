<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Étiquettes</title>
<style>
  @page { size: A4; margin: 0; }
  body { font-family: 'Arial', sans-serif; background: #eef2f8; margin: 0; padding: 0; }

  /* --- ONGLETS --- */
  .tabbar{position:sticky;top:0;z-index:9998;background:#13237e;display:flex;align-items:center;gap:6px;padding:8px 12px;box-shadow:0 3px 10px rgba(0,0,0,.2)}
  .tab{padding:9px 16px;border:none;border-radius:8px;background:rgba(255,255,255,.14);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
  .tab.active{background:#fff;color:#13237e}
  .sync{margin-left:auto;color:#cdd6ff;font-size:12px;font-weight:600}

  /* --- PANNEAU 1 (générateur, existant) --- */
  .no-print { background: #fff; color: #333; padding: 10px; text-align: center; border-bottom: 4px solid #000; }
  .control-panel { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 10px; background: #f4f4f4; padding: 10px; border-radius: 8px; }
  .input-group { background: #fff; padding: 5px; border: 1px solid #ddd; border-radius: 4px; display: flex; flex-direction: column; align-items: center; }
  .input-group label { font-size: 9px; font-weight: bold; color: #c0392b; margin-bottom: 3px; text-transform: uppercase; }
  .input-group div { display: flex; gap: 2px; }
  .input-group input { width: 42px; text-align: center; padding: 2px; border: 1px solid #ccc; font-size: 11px; font-weight: bold; }
  textarea { width: 95%; height: 100px; border: 2px solid #ccc; padding: 5px; font-size: 11px; font-family: monospace; }
  button.act { padding: 8px 20px; cursor: pointer; background: #c0392b; color: #fff; border: none; font-size: 13px; font-weight: bold; border-radius: 4px; margin-top: 5px; }
  .print-btn { background: #27ae60; margin-left: 10px; }

  #colorModalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100000; justify-content: center; align-items: center; }
  #colorModal { background: white; padding: 20px; border-radius: 12px; width: 550px; max-width:94vw; max-height: 90vh; overflow-y: auto; text-align: center; }
  .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-top: 15px; }
  .color-swatch { width: 100%; aspect-ratio: 1; border-radius: 3px; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
  .color-swatch:hover { transform: scale(1.2); border: 2px solid #000; z-index: 10; }

  .page-sheet { width: 210mm; height: 296mm; background: white; margin: 20px auto; padding-top: 5mm; padding-left: 9mm; box-sizing: border-box; display: grid; grid-template-columns: repeat(4, 48mm); grid-template-rows: repeat(16, 17.6mm); row-gap: 0.5mm; column-gap: 0.5mm; page-break-after: always; position: relative; }
  .label { width: 48mm; height: 17.6mm; border: 0.3mm solid #000; position: relative; background: white; overflow: hidden; box-sizing: border-box; cursor: pointer; }
  .brand { position: absolute; font-family: 'Arial Black', sans-serif; font-weight: 900; text-transform: uppercase; color: #000; white-space: nowrap; transform: scaleX(0.85); transform-origin: left top; letter-spacing: -0.5px; }
  .qty { position: absolute; font-family: 'Arial', sans-serif; font-weight: bold; color: #000; }
  .color-bar { position: absolute; width: 25mm; height: 8.0mm; display: flex; align-items: center; justify-content: center; border-radius: 2.5mm 0 0 2.5mm; z-index: 1; }
  .variant-name { color: white; font-family: 'Arial Narrow', sans-serif; font-weight: 800; text-align: center; line-height: 0.9; width: 100%; padding: 0 1mm; box-sizing: border-box; }
  .price-box { position: absolute; width: 20.3mm; height: 13.0mm; background: white; border: 3px solid #000; border-radius: 2.5mm; display: flex; align-items: center; justify-content: center; z-index: 2; box-sizing: border-box; }
  .price-text { font-family: 'Arial', sans-serif; color: #000; line-height: 0.9; display: flex; align-items: flex-start; transform: scaleX(0.9); }
  .price-int { font-size: 30pt; font-weight: 700; letter-spacing: -1px; }
  .price-dec { font-size: 16pt; margin-top: 1.5mm; margin-left: 0.5px; font-weight: 700; text-decoration: underline; text-decoration-thickness: 2px; text-underline-offset: 4px; }
  .ref-code { position: absolute; font-family: 'Arial', sans-serif; font-weight: bold; color: #000; }

  /* --- PANNEAU 2 (données) --- */
  #tab2{padding:14px;max-width:1100px;margin:0 auto}
  .card2{background:#fff;border:1px solid #d9e0ee;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 1px 5px rgba(0,0,0,.05)}
  .card2 h3{margin:0 0 8px;font-size:14px;color:#13237e}
  .bar2{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
  .btn{background:#13237e;color:#fff;border:none;border-radius:8px;padding:10px 15px;font-size:13px;font-weight:700;cursor:pointer}
  .btn.green{background:#27ae60}.btn.grey{background:#eef1fa;color:#13237e;border:1px solid #d9e0ee}
  .imp{width:100%;height:80px;border:2px dashed #b9c4de;border-radius:8px;padding:8px;font-family:monospace;font-size:11px}
  .tblwrap{overflow:auto;border:1px solid #e2e7f2;border-radius:8px;max-height:64vh}
  table.data{border-collapse:collapse;width:100%;font-size:13px;white-space:nowrap}
  table.data th{position:sticky;top:0;background:#13237e;color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:.3px;padding:8px;text-align:left}
  table.data td{border-bottom:1px solid #eef1f7;padding:2px 4px}
  table.data tr:nth-child(even){background:#f7f9fd}
  table.data input{border:1px solid transparent;background:transparent;font-size:13px;padding:6px;width:100%;min-width:60px;border-radius:5px;font-family:inherit}
  table.data input:focus{outline:none;border-color:#13237e;background:#fff}
  .sw{width:34px;height:26px;border-radius:5px;cursor:pointer;border:1px solid rgba(0,0,0,.25);display:inline-block;vertical-align:middle}
  .delrow{background:none;border:none;color:#c0392b;font-size:16px;cursor:pointer}
  .cnt{color:#6b7280;font-size:12px;font-weight:600}
  #palOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100001;justify-content:center;align-items:center}
  #palBox{background:#fff;padding:16px;border-radius:14px;width:430px;max-width:94vw;max-height:80vh;overflow:auto;text-align:center}
  #palBox h3{margin:0 0 4px}#palBox p{margin:0 0 10px;color:#666;font-size:12px}
  .pal-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:4px}
  .pal-sw{width:100%;aspect-ratio:1;border-radius:4px;cursor:pointer;border:1px solid rgba(0,0,0,.12)}
  .pal-sw:hover{border-color:#111;box-shadow:0 0 0 2px #111}
  /* toolbar + catégories + drag */
  .toolbar2{position:sticky;top:0;z-index:40;background:#eef2f8;display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 0}
  .cathead td{background:#13237e;color:#fff;font-weight:800;font-size:12px;padding:5px 8px}
  .catname{background:transparent;border:none;color:#fff;font-weight:800;font-size:12px;padding:4px;text-transform:uppercase;min-width:150px}
  .catname:focus{outline:none;background:rgba(255,255,255,.16);border-radius:4px}
  .mini{background:rgba(255,255,255,.22);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;margin-left:8px}
  td.dh{width:24px;text-align:center;color:#fff;cursor:grab;font-size:13px;user-select:none}
  tr.prow.dragover{outline:2px dashed #13237e;outline-offset:-2px}

  @media print { .tabbar,.no-print,#colorModalOverlay,#tab2,#palOverlay { display: none !important; } body { background: white; } .page-sheet { margin: 0; box-shadow: none; border: none; } }
</style></head><body>

<div class="tabbar no-print">
  <button class="tab active" id="tabBtn1" onclick="showTab(1)">🏷️ Étiquettes</button>
  <button class="tab" id="tabBtn2" onclick="showTab(2)">📋 Données</button>
  <span class="sync" id="syncBadge"></span>
</div>

<!-- ===== ONGLET 1 : GÉNÉRATEUR ===== -->
<div id="tab1">
  <div class="no-print">
    <div class="control-panel">
      <div class="input-group"><label>Marka (Fnt/X/Y)</label><div><input type="number" id="bF" value="11" onchange="applyAll()"><input type="number" id="bX" value="0.7" step="0.1" onchange="applyAll()"><input type="number" id="bY" value="-0.9" step="0.1" onchange="applyAll()"></div></div>
      <div class="input-group"><label>Çeşit (Fnt/X/Y)</label><div><input type="number" id="vF" value="10" onchange="applyAll()"><input type="number" id="vX" value="0.5" step="0.1" onchange="applyAll()"><input type="number" id="vY" value="5.1" step="0.1" onchange="applyAll()"></div></div>
      <div class="input-group"><label>Adet (Fnt/X/Y)</label><div><input type="number" id="qF" value="9" onchange="applyAll()"><input type="number" id="qX" value="0.5" step="0.1" onchange="applyAll()"><input type="number" id="qY" value="-0.3" step="0.1" onchange="applyAll()"></div></div>
      <div class="input-group"><label>Fiyat (Ölç/X/Y)</label><div><input type="number" id="pS" value="0.95" step="0.05" onchange="applyAll()"><input type="number" id="pX" value="2.4" step="0.1" onchange="applyAll()"><input type="number" id="pY" value="3.4" step="0.1" onchange="applyAll()"></div></div>
      <div class="input-group"><label>Ref (Fnt/X/Y)</label><div><input type="number" id="rF" value="9.5" onchange="applyAll()"><input type="number" id="rX" value="0.4" step="0.1" onchange="applyAll()"><input type="number" id="rY" value="-0.3" step="0.1" onchange="applyAll()"></div></div>
      <div class="input-group"><label>Sayfa (Ü/S)</label><div><input type="number" id="mTop" value="5" onchange="applyAll()"><input type="number" id="mLeft" value="9" onchange="applyAll()"></div></div>
    </div>
    <textarea id="inputData" placeholder="KOD, MARKA, ÇEŞİT, ADET, FİYAT, RENK"></textarea><br>
    <button class="act" onclick="generateLabels()">ETİKETLERİ OLUŞTUR</button>
    <button class="act print-btn" onclick="window.print()">YAZDIR</button>
  </div>
  <div id="colorModalOverlay" onclick="closeColorModal(event)">
    <div id="colorModal">
      <h3 style="margin-top:0">Palette</h3>
      <h4 id="mTitle">Renk Seç</h4>
      <div class="color-grid" id="paletteGrid"></div>
    </div>
  </div>
  <div id="print-area"></div>
</div>

<!-- ===== ONGLET 2 : DONNÉES (synchronisé) ===== -->
<div id="tab2" style="display:none">
  <div class="toolbar2">
    <button class="btn green" onclick="copyAllData()">📋 Copier les données</button>
    <button class="btn" onclick="generateFromData()">🏷️ Générer les étiquettes →</button>
    <button class="btn grey" onclick="addCategory()">+ Catégorie</button>
    <span class="cnt" id="rowCount"></span>
  </div>

  <div class="card2">
    <h3>📥 Importer / coller les données (depuis Excel)</h3>
    <textarea class="imp" id="importBox" placeholder="Collez ici vos colonnes : Famille&#9;Code&#9;Marque&#9;Détail&#9;Qté&#9;Prix&#9;Date&#9;#Couleur"></textarea>
    <div class="bar2" style="margin-top:8px">
      <button class="btn" onclick="importData()">Importer (remplacer)</button>
      <button class="btn grey" onclick="importData(true)">Ajouter à la liste</button>
    </div>
  </div>

  <div class="card2">
    <div class="tblwrap">
      <table class="data">
        <thead><tr>
          <th></th><th>Code</th><th>Marque</th><th>Détail</th><th>Qté</th><th>Prix</th><th>Date</th><th>Couleur</th><th></th>
        </tr></thead>
        <tbody id="dataRows"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- palette large (couleurs visuelles) -->
<div id="palOverlay" onclick="if(event.target.id==='palOverlay')closePal()">
  <div id="palBox">
    <h3>Choisir une couleur</h3>
    <p>Cliquez sur la couleur voulue</p>
    <div class="pal-grid" id="palGrid"></div>
  </div>
</div>

<script>
// ================= PALETTE (couleurs) =================
const megaPalette = [
  ["#ffebee","#ffcdd2","#ef9a9a","#e57373","#ef5350","#f44336","#e53935","#d32f2f","#c62828","#b71c1c"],
  ["#fce4ec","#f8bbd0","#f48fb1","#f06292","#ec407a","#e91e63","#d81b60","#c2185b","#ad1457","#880e4f"],
  ["#f3e5f5","#e1bee7","#ce93d8","#ba68c8","#ab47bc","#9c27b0","#8e24aa","#7b1fa2","#6a1b9a","#4a148c"],
  ["#ede7f6","#d1c4e9","#b39ddb","#9575cd","#7e57c2","#673ab7","#5e35b1","#512da8","#4527a0","#311b92"],
  ["#e8eaf6","#c5cae9","#9fa8da","#7986cb","#5c6bc0","#3f51b5","#3949ab","#303f9f","#283593","#1a237e"],
  ["#e3f2fd","#bbdefb","#90caf9","#64b5f6","#42a5f5","#2196f3","#1e88e5","#1976d2","#1565c0","#0d47a1"],
  ["#e1f5fe","#b3e5fc","#81d4fa","#4fc3f7","#29b6f6","#03a9f4","#039be5","#0288d1","#0277bd","#01579b"],
  ["#e0f7fa","#b2ebf2","#80deea","#4dd0e1","#26c6da","#00bcd4","#00acc1","#0097a7","#00838f","#006064"],
  ["#e0f2f1","#b2dfdb","#80cbc4","#4db6ac","#26a69a","#009688","#00897b","#00796b","#00695c","#004d40"],
  ["#e8f5e9","#c8e6c9","#a5d6a7","#81c784","#66bb6a","#4caf50","#43a047","#388e3c","#2e7d32","#1b5e20"],
  ["#f1f8e9","#dcedc8","#c5e1a5","#aed581","#9ccc65","#8bc34a","#7cb342","#689f38","#558b2f","#33691e"],
  ["#fff8e1","#ffecb3","#ffe082","#ffd54f","#ffca28","#ffc107","#ffb300","#ffa000","#ff8f00","#ff6f00"],
  ["#fff3e0","#ffe0b2","#ffcc80","#ffb74d","#ffa726","#ff9800","#fb8c00","#f57c00","#ef6c00","#e65100"],
  ["#fbe9e7","#ffccbc","#ffab91","#ff8a65","#ff7043","#ff5722","#f4511e","#e64a19","#d84315","#bf360c"],
  ["#efebe9","#d7ccc8","#bcaaa4","#a1887f","#8d6e63","#795548","#6d4c41","#5d4037","#4e342e","#3e2723"],
  ["#fafafa","#eeeeee","#bdbdbd","#9e9e9e","#757575","#616161","#424242","#212121","#000000","#ffffff"],
  ["#eceff1","#cfd8dc","#b0bec5","#90a4ae","#78909c","#607d8b","#546e7a","#455a64","#37474f","#263238"],
  ["#ff3131","#c2ab06","#571f87","#0864a9","#704219","#92c998","#1e211b","#a7111a","#448aff","#fbc02d"]
];
const flatColors = megaPalette.flat();

// palette pour éditer une étiquette dans l'aperçu (onglet 1)
let currentClickedLabel = null;
const paletteGrid = document.getElementById('paletteGrid');
flatColors.forEach(color => {
  const d=document.createElement('div'); d.className='color-swatch'; d.style.backgroundColor=color;
  d.onclick=()=>{ if(currentClickedLabel){
    const bar=currentClickedLabel.querySelector('.color-bar'); if(bar) bar.style.backgroundColor=color;
    const pb=currentClickedLabel.querySelector('.price-box'); if(pb) pb.style.borderColor=color;
    const pd=currentClickedLabel.querySelector('.price-dec'); if(pd) pd.style.textDecorationColor=color;
  } closeColorModal(null,true); };
  paletteGrid.appendChild(d);
});
function openColorPicker(l){ currentClickedLabel=l; document.getElementById('colorModalOverlay').style.display='flex'; }
function closeColorModal(e,f=false){ if(f||e.target.id==='colorModalOverlay') document.getElementById('colorModalOverlay').style.display='none'; }

// ================= ONGLET 1 : GÉNÉRATEUR (inchangé) =================
function applyAll(){
  const g=id=>document.getElementById(id).value;
  const bF=g('bF')+'pt',bX=g('bX')+'mm',bY=g('bY')+'mm', vF=g('vF')+'pt',vX=g('vX')+'mm',vY=g('vY')+'mm',
    qF=g('qF')+'pt',qX=g('qX')+'mm',qY=g('qY')+'mm', pS=g('pS'),pX=g('pX')+'mm',pY=g('pY')+'mm',
    rF=g('rF')+'pt',rX=g('rX')+'mm',rY=g('rY')+'mm', mT=g('mTop')+'mm',mL=g('mLeft')+'mm';
  document.querySelectorAll('.page-sheet').forEach(p=>{p.style.paddingTop=mT;p.style.paddingLeft=mL;});
  document.querySelectorAll('.brand').forEach(el=>{el.style.fontSize=bF;el.style.left=bX;el.style.top=bY;});
  document.querySelectorAll('.color-bar').forEach(el=>{el.style.left=vX;el.style.top=vY;});
  document.querySelectorAll('.variant-name').forEach(el=>{el.style.fontSize=vF;});
  document.querySelectorAll('.qty').forEach(el=>{el.style.fontSize=qF;el.style.right=qX;el.style.top=qY;});
  document.querySelectorAll('.price-box').forEach(el=>{el.style.transform=`scale(${pS})`;el.style.right=pX;el.style.top=pY;});
  document.querySelectorAll('.ref-code').forEach(el=>{el.style.fontSize=rF;el.style.left=rX;el.style.bottom=rY;});
}
function generateLabels(){
  const input=document.getElementById('inputData').value;
  const main=document.getElementById('print-area'); main.innerHTML='';
  const lines=input.split('\n').filter(l=>l.trim()!=='');
  for(let i=0;i<lines.length;i+=64){
    const pageDiv=document.createElement('div'); pageDiv.className='page-sheet';
    lines.slice(i,i+64).forEach(line=>{
      let parts=line.split(',').map(p=>p.trim());
      if(parts.length<5) return;
      let code=parts[0],brand=parts[1],variant=parts[2],qty=parts[3],color="#333",pInt="00",pDec="00";
      let colorIdx=parts.findIndex(p=>p.startsWith('#'));
      if(colorIdx!==-1){ color=parts[colorIdx]; let pp=parts.slice(4,colorIdx);
        if(pp.length===2){pInt=pp[0];pDec=pp[1];} else if(pp.length===1){let s=pp[0].split(/[.,]/);pInt=s[0];pDec=s[1]||"00";}
      }
      pageDiv.insertAdjacentHTML('beforeend',`
        <div class="label" onclick="openColorPicker(this)">
          <div class="brand">${brand}</div><div class="qty">${qty}</div>
          <div class="color-bar" style="background-color:${color};"><div class="variant-name">${variant}</div></div>
          <div class="price-box" style="border-color:${color};">
            <div class="price-text"><span class="price-int">${pInt}</span><span class="price-dec" style="text-decoration-color:${color};">${pDec}</span></div>
          </div>
          <div class="ref-code">${code}</div>
        </div>`);
    });
    main.appendChild(pageDiv);
  }
  applyAll();
}

// ================= ONGLETS =================
function showTab(n){
  document.getElementById('tab1').style.display = n===1?'block':'none';
  document.getElementById('tab2').style.display = n===2?'block':'none';
  document.getElementById('tabBtn1').classList.toggle('active',n===1);
  document.getElementById('tabBtn2').classList.toggle('active',n===2);
}

// ================= ONGLET 2 : DONNÉES + SYNC =================
const LS_KEY="etiketData";
const WORKER_URL="https://etiket-data.w3ruslan-8c5.workers.dev";
let rows = (JSON.parse(localStorage.getItem(LS_KEY)||"null")||{}).rows || [];
let syncTimer=null;

function saveLocal(){ localStorage.setItem(LS_KEY, JSON.stringify({rows})); }
function save(){ saveLocal(); localStorage.setItem('pendingEtiket','1'); scheduleSync(); }
function setSync(t){ const e=document.getElementById('syncBadge'); if(e) e.textContent=t; }

async function pullData(){
  setSync('⏳ Chargement…');
  try{
    const r=await fetch(WORKER_URL+"?t="+Date.now(),{cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const cloud=await r.json();
    const cloudRows=Array.isArray(cloud.rows)?cloud.rows:[];
    const pending=localStorage.getItem('pendingEtiket')==='1';
    if(pending){ await pushData(); return; }
    if(cloudRows.length===0 && rows.length>0){ await pushData(); return; }
    rows=cloudRows; saveLocal(); renderRows();
    setSync('☁️ Synchronisé');
  }catch(e){ setSync('👁️ Hors ligne ('+e.message+')'); }
}
function scheduleSync(){ setSync('✎ Enregistrement…'); clearTimeout(syncTimer); syncTimer=setTimeout(pushData,900); }
async function pushData(){
  setSync('⏳ Enregistrement…');
  try{
    const r=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rows})});
    if(!r.ok) throw new Error('HTTP '+r.status);
    localStorage.removeItem('pendingEtiket'); setSync('☁️ Synchronisé');
  }catch(e){ setSync('⚠️ '+e.message); }
}

function importData(append){
  const txt=document.getElementById('importBox').value;
  const lines=txt.split('\n').map(l=>l.replace(/\r/,'')).filter(l=>l.trim()!=='');
  const parsed=[];
  lines.forEach(line=>{
    let c=line.split('\t').map(x=>x.trim());
    if(c.length<2) return;
    const code=(c[1]||'').trim();
    if(!/^\d+$/.test(code)) return; // en-tête / invalide
    const color=(c.find(x=>/^#([0-9a-f]{3,8})$/i.test(x))||c[7]||'#333333').trim();
    parsed.push({ famille:c[0]||'', code, marque:(c[2]||'').trim(), detail:(c[3]||'').trim(),
      qte:(c[4]||'').trim(), prix:(c[5]||'').trim(), date:(c[6]||'').trim(), couleur:color });
  });
  if(parsed.length===0){ alert("Aucune ligne valide détectée. Collez les colonnes séparées par des tabulations (depuis Excel)."); return; }
  rows = append ? rows.concat(parsed) : parsed;
  document.getElementById('importBox').value='';
  normalize(); save(); renderRows();
  alert(parsed.length+" lignes importées.");
}

function esc(s){ return String(s==null?'':s).replace(/"/g,'&quot;'); }
function hexToRgba(hex,a){ hex=String(hex||'#333333').replace('#',''); if(hex.length===3) hex=hex.split('').map(c=>c+c).join(''); const n=parseInt(hex,16); if(isNaN(n)) return 'transparent'; return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }

// tri : catégories dans l'ordre d'apparition, produits alphabétiques (marque puis détail)
function normalize(){
  const order=[], groups={};
  rows.forEach(r=>{ const f=r.famille||'(sans catégorie)'; if(!(f in groups)){ groups[f]=[]; order.push(f);} groups[f].push(r); });
  const key=r=>((r.marque||'')+' '+(r.detail||'')).trim().toLocaleLowerCase('fr');
  const out=[];
  order.forEach(f=>{ groups[f].sort((a,b)=>key(a).localeCompare(key(b),'fr',{numeric:true})); out.push(...groups[f]); });
  rows=out;
}
function sortAndRender(){ normalize(); saveLocal(); renderRows(); }
function rowEnter(e){ if(e.key==='Enter'){ e.target.blur&&e.target.blur(); setTimeout(sortAndRender,0); } }

function prow(r,k){
  const col=r.couleur||'#333333';
  return `<tr class="prow" onkeydown="rowEnter(event)" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropRow(event,${k})" style="background:${hexToRgba(col,.12)}">
    <td class="dh" draggable="true" ondragstart="dragStart(event,${k})" style="background:${col}">⠿</td>
    <td><input value="${esc(r.code)}" onchange="editCell(${k},'code',this.value)" style="width:70px;min-width:70px"></td>
    <td><input value="${esc(r.marque)}" onchange="editCell(${k},'marque',this.value)" style="min-width:100px"></td>
    <td><input value="${esc(r.detail)}" onchange="editCell(${k},'detail',this.value)" style="min-width:140px"></td>
    <td><input value="${esc(r.qte)}" onchange="editCell(${k},'qte',this.value)" style="width:52px;min-width:52px"></td>
    <td><input value="${esc(r.prix)}" onchange="editCell(${k},'prix',this.value)" style="width:60px;min-width:60px"></td>
    <td><input value="${esc(r.date)}" onchange="editCell(${k},'date',this.value)" style="width:60px;min-width:60px"></td>
    <td><span class="sw" style="background:${col}" onclick="openPal(${k})" title="${col}"></span></td>
    <td><button class="delrow" onclick="delRow(${k})">🗑️</button></td>
  </tr>`;
}
function renderRows(){
  const tb=document.getElementById('dataRows');
  document.getElementById('rowCount').textContent = rows.length+' produit(s)';
  if(rows.length===0){ tb.innerHTML='<tr><td colspan="9" style="text-align:center;color:#94a2bd;padding:20px">Aucune donnée. Importez, ou ajoutez une catégorie.</td></tr>'; return; }
  let html='',i=0;
  while(i<rows.length){
    const fam=rows[i].famille||'(sans catégorie)';
    let j=i; while(j<rows.length && (rows[j].famille||'(sans catégorie)')===fam) j++;
    html+=`<tr class="cathead"><td colspan="9">📁 <input class="catname" value="${esc(fam)}" onchange="renameCat(${i},${j},this.value)"><button class="mini" onclick="addRowToGroup(${j})">+ Ligne</button></td></tr>`;
    for(let k=i;k<j;k++) html+=prow(rows[k],k);
    i=j;
  }
  tb.innerHTML=html;
}
function editCell(i,field,val){ if(rows[i]){ rows[i][field]=val; save(); } }
function addRowToGroup(idx){ const fam=(rows[idx-1]||{}).famille||''; rows.splice(idx,0,{famille:fam,code:'',marque:'',detail:'',qte:'',prix:'',date:'',couleur:'#333333'}); save(); renderRows(); }
function addCategory(){ const n=prompt("Nom de la nouvelle catégorie ?"); if(!n) return; rows.push({famille:n.toUpperCase().trim(),code:'',marque:'',detail:'',qte:'',prix:'',date:'',couleur:'#333333'}); save(); renderRows(); }
function renameCat(start,end,name){ const nm=name.trim(); for(let k=start;k<end;k++) if(rows[k]) rows[k].famille=nm; save(); renderRows(); }
function delRow(i){ rows.splice(i,1); save(); renderRows(); }

// glisser-déposer pour réordonner
let dragIdx=null;
function dragStart(e,i){ dragIdx=i; e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain',String(i));}catch(_){} }
function dragOver(e){ e.preventDefault(); const tr=e.currentTarget; if(tr&&tr.classList) tr.classList.add('dragover'); }
function dragLeave(e){ const tr=e.currentTarget; if(tr&&tr.classList) tr.classList.remove('dragover'); }
function dropRow(e,targetIdx){
  e.preventDefault();
  const tr=e.currentTarget; if(tr&&tr.classList) tr.classList.remove('dragover');
  if(dragIdx===null||dragIdx===targetIdx){ dragIdx=null; return; }
  const targetRow=rows[targetIdx];
  const moved=rows.splice(dragIdx,1)[0];
  moved.famille=targetRow.famille;                 // rejoint la catégorie de destination
  const nt=rows.indexOf(targetRow);
  rows.splice(dragIdx<targetIdx ? nt+1 : nt, 0, moved);
  dragIdx=null; normalize(); save(); renderRows();
}

// copier toutes les données (avec les couleurs actuelles)
function copyText(t){ const ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.left='-9999px'; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(ta); }
function copyAllData(){
  if(rows.length===0){ alert("Aucune donnée à copier."); return; }
  const txt=rows.map(r=>[r.famille||'',r.code||'',r.marque||'',r.detail||'',r.qte||'',r.prix||'',r.date||'',r.couleur||''].join('\t')).join('\n');
  copyText(txt);
  const b=document.getElementById('syncBadge'), old=b.textContent; b.textContent='📋 Copié ('+rows.length+') !'; setTimeout(()=>{b.textContent=old;},1300);
}

// palette large pour la colonne couleur
let palRowIdx=null;
const palGrid=document.getElementById('palGrid');
flatColors.forEach(c=>{ const d=document.createElement('div'); d.className='pal-sw'; d.style.background=c; d.title=c;
  d.onclick=()=>{ if(palRowIdx!=null && rows[palRowIdx]){ rows[palRowIdx].couleur=c; save(); renderRows(); } closePal(); };
  palGrid.appendChild(d); });
function openPal(i){ palRowIdx=i; document.getElementById('palOverlay').style.display='flex'; }
function closePal(){ document.getElementById('palOverlay').style.display='none'; palRowIdx=null; }

function generateFromData(){
  if(rows.length===0){ alert("Aucune donnée. Importez d'abord vos produits."); return; }
  const text=rows.map(r=>`${r.code}, ${r.marque}, ${r.detail}, ${r.qte}, ${r.prix}, ${r.couleur}`).join('\n');
  document.getElementById('inputData').value=text;
  showTab(1); generateLabels();
  window.scrollTo(0,0);
}

// démarrage
renderRows();
pullData();
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) pullData(); });
</script></body></html>
