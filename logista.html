<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logista → Prix</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{--blue:#2d2e83;--blue2:#3f40b0;--bg:#eef1f8;--card:#fff;--line:#dde3f0;--ink:#1c2233;--muted:#6b7280;--green:#12a150;--orange:#e0680f;--red:#dc2626}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);padding:16px;max-width:820px;margin:0 auto}
  h1{font-size:22px;margin:6px 0 2px;color:var(--blue);display:flex;align-items:center;gap:8px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
  .drop{border:2px dashed var(--blue2);border-radius:16px;padding:26px;text-align:center;background:#f7f8ff;cursor:pointer}
  .drop.drag{background:#e9ebff;border-color:var(--blue)}
  .drop b{color:var(--blue)}
  input[type=file]{display:none}
  .btn{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer}
  .btn.ghost{background:#eef1fb;color:var(--blue);border:1px solid var(--line)}
  #status{text-align:center;color:var(--muted);font-size:14px;padding:8px}
  .bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
  .stat{font-weight:700;color:var(--blue)}
  .stat small{color:var(--orange)}
  .search{flex:1;min-width:160px;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px}
  .chk{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;border-bottom:2px solid var(--line);position:sticky;top:0;background:var(--card)}
  td{padding:9px 8px;border-bottom:1px solid #eef1f6}
  td.code{color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
  td.old{color:var(--muted);text-align:right;white-space:nowrap}
  td.new{text-align:right;font-weight:800;white-space:nowrap;font-variant-numeric:tabular-nums}
  td.new.up{color:var(--green)} td.new.same{color:var(--muted)}
  .tblwrap{max-height:60vh;overflow:auto;border:1px solid var(--line);border-radius:12px}
  .hidden{display:none}
  .foot{color:var(--muted);font-size:12px;text-align:center;margin-top:14px}
  .foot a{color:var(--blue)}
</style>
</head>
<body>

<h1>🚬 Logista → Prix</h1>
<div class="sub">Chargez le PDF Logista, l'application extrait automatiquement les produits et leurs prix.</div>

<div class="card">
  <label class="drop" id="drop">
    <input type="file" id="file" accept="application/pdf">
    📄 <b>Cliquez</b> ou glissez le PDF Logista ici
    <div style="font-size:12px;color:#8891a8;margin-top:6px">Traitement 100% local — rien n'est envoyé sur internet.</div>
  </label>
  <div id="status"></div>
</div>

<div class="card hidden" id="results">
  <div class="bar">
    <span class="stat" id="stat"></span>
    <input class="search" id="search" placeholder="🔍 Rechercher (ex: marlboro gold)…" oninput="render()">
    <label class="chk"><input type="checkbox" id="onlyChanged" onchange="render()"> Prix modifiés</label>
    <button class="btn ghost" onclick="copyAll()">📋 Copier</button>
  </div>
  <div class="tblwrap">
    <table>
      <thead><tr><th>Code</th><th>Produit</th><th style="text-align:right">Ancien</th><th style="text-align:right">Nouveau</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <div class="foot" id="dateInfo"></div>
</div>

<div class="foot">Outil étiquettes de prix : <a href="./">Générateur d'étiquettes</a></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
let products=[], dateLabel='';

const drop=document.getElementById('drop'), fileInput=document.getElementById('file');
['dragover','dragenter'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('drag');}));
['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove('drag');}));
drop.addEventListener('drop',ev=>{ if(ev.dataTransfer.files[0]) handleFile(ev.dataTransfer.files[0]); });
fileInput.addEventListener('change',()=>{ if(fileInput.files[0]) handleFile(fileInput.files[0]); });

async function handleFile(file){
  if(file.type!=='application/pdf' && !file.name.toLowerCase().endsWith('.pdf')){ setStatus("⚠️ Merci de choisir un fichier PDF."); return; }
  setStatus("⏳ Lecture du PDF…");
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    const TOL=4; let lines=[];
    for(let p=1;p<=pdf.numPages;p++){
      setStatus(`⏳ Analyse page ${p}/${pdf.numPages}…`);
      const page=await pdf.getPage(p);
      const tc=await page.getTextContent();
      const items=tc.items.filter(it=>it.str.trim()).map(it=>({y:it.transform[5],x:it.transform[4],s:it.str}));
      items.sort((a,b)=>b.y-a.y||a.x-b.x);
      let rows=[],cur=null;
      for(const it of items){
        if(!cur||Math.abs(it.y-cur.y)>TOL){ cur={y:it.y,items:[it]}; rows.push(cur); }
        else cur.items.push(it);
      }
      rows.forEach(r=>{
        let line=r.items.sort((a,b)=>a.x-b.x).map(o=>o.s).join(' ').replace(/(\d)\s*,\s*(\d\d)/g,'$1,$2').replace(/\s+/g,' ');
        lines.push(line);
      });
    }
    parseLines(lines);
    if(products.length===0){ setStatus("⚠️ Aucun produit détecté. Ce PDF n'a peut-être pas le format Logista attendu."); return; }
    setStatus(`✅ ${products.length} produits extraits.`);
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('dateInfo').textContent = dateLabel ? ('Tarif : '+dateLabel) : '';
    render();
  }catch(e){ setStatus("⚠️ Erreur de lecture : "+e.message); }
}

function parseLines(lines){
  products=[]; dateLabel='';
  for(const line of lines){
    if(!dateLabel){ const d=line.match(/Prix au\s+(.+?)(?:\s{2,}|$)/i); if(d) dateLabel=d[1].trim(); }
    const m=line.match(/^\s*(\d{4,6})\s+(.+)/); if(!m) continue;
    const code=m[1], rest=m[2];
    const prices=[...rest.matchAll(/(\d+,\d{2})/g)].map(x=>x[1]); if(!prices.length) continue;
    const sansCh=/sans changement/i.test(rest);
    const name=rest.slice(0,rest.indexOf(prices[0])).trim();
    if(!name) continue;
    const oldP=prices[0], newP=sansCh?oldP:prices[prices.length-1];
    products.push({code,name,oldP,newP,changed:!sansCh && oldP!==newP});
  }
}

function setStatus(t){ document.getElementById('status').textContent=t; }

function filtered(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const only=document.getElementById('onlyChanged').checked;
  return products.filter(p=>(!only||p.changed) && (!q || (p.name+' '+p.code).toLowerCase().includes(q)));
}
function render(){
  const list=filtered();
  const changed=products.filter(p=>p.changed).length;
  document.getElementById('stat').innerHTML=`${list.length} / ${products.length} produits · <small>${changed} modifiés</small>`;
  document.getElementById('rows').innerHTML=list.map(p=>`
    <tr>
      <td class="code">${p.code}</td>
      <td>${p.name}</td>
      <td class="old">${p.oldP} €</td>
      <td class="new ${p.changed?'up':'same'}">${p.newP} €</td>
    </tr>`).join('') || '<tr><td colspan="4" style="text-align:center;color:#8891a8;padding:20px">Aucun résultat</td></tr>';
}

function copyAll(){
  const list=filtered();
  const txt=list.map(p=>`${p.code}\t${p.name}\t${p.newP}`).join('\n');
  const ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.left='-9999px';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); setStatus(`📋 ${list.length} lignes copiées (collez dans Excel).`); }catch(e){ setStatus("Copie impossible."); }
  document.body.removeChild(ta);
}
</script>
</body>
</html>
